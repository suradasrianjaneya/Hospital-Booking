databases:
  - name: hospital-booking-db
    plan: free

services:
  - type: web
    name: hospital-booking
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run server
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: hospital-booking-db
          property: connectionString
